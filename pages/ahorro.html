<div class="history-card">
    <div class="history-card-header">
        <span class="title title-main">Ahorro</span>
        <button class="btn btn-savings btn-add-savings" style="width: auto; padding: 10px 16px;">
            <img src="assets/icons/plus.svg" class="icon icon-sm" style="filter: brightness(0) invert(1);">
            Nuevo Ahorro
        </button>
    </div>

    <!-- TARJETAS -->
    <div class="stats-row stats-row-3">
        <div class="stat-card">
            <div class="stat-card-info">
                <span class="text text-secondary">Disponible</span>
                <span id="savings-available" class="title title-main title-savings">$0.00</span>
            </div>
            <div class="icon-container">
                <div class="icon-bg icon-bg-savings"></div>
                <img src="assets/icons/gift.svg" class="icon icon-savings">
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-card-info">
                <span class="text text-secondary">Asignado</span>
                <span id="savings-assigned" class="title title-main title-savings">$0.00</span>
            </div>
            <div class="icon-container">
                <div class="icon-bg icon-bg-savings"></div>
                <img src="assets/icons/money.svg" class="icon icon-savings">
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-card-info">
                <span class="text text-secondary">Restante</span>
                <span id="savings-remaining" class="title title-main title-savings">$0.00</span>
            </div>
            <div class="icon-container">
                <div class="icon-bg icon-bg-savings"></div>
                <img src="assets/icons/pesos.svg" class="icon icon-savings">
            </div>
        </div>
    </div>

    <!-- FORMULARIO CREAR -->
    <div class="form form-savings" id="form-create-savings" style="display:none">
        <div class="fields">
            <div class="field">
                <span class="text text-secondary">Nombre</span>
                <input id="saving-name" class="input" placeholder="Nombre">
            </div>
            <div class="field">
                <span class="text text-secondary">Porcentaje de Ahorro</span>
                <input id="saving-percentage" class="input" placeholder="Porcentaje de Ahorro" type="number">
            </div>
        </div>
        <div class="actions">
            <button id="btn-save-saving" class="btn btn-savings">Guardar</button>
            <button class="btn btn-base btn-cancel-savings">Cancelar</button>
        </div>
    </div>

    <!-- LISTA DE AHORROS -->
    <div id="savings-list"></div>
</div>
