<div class="history-card">
    <div class="content-header">
        <div id="header-avatar" class="profile-avatar">J</div>
        <span id="header-title" class="title title-main">Bienvenido, Juan</span>
    </div>

    <!-- CARD 1 -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-card-info">
                <span class="text text-secondary">Ingresos</span>
                <span id="home-total-income" class="title title-main title-income">$0.00</span>
            </div>
            <div class="icon-container">
                <div class="icon-bg icon-bg-income"></div>
                <img src="assets/icons/increase.svg" class="icon icon-income">
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-card-info">
                <span class="text text-secondary">Gastos</span>
                <span id="home-total-expenses" class="title title-main title-expense">$0.00</span>
            </div>
            <div class="icon-container">
                <div class="icon-bg icon-bg-expense"></div>
                <img src="assets/icons/degrowth.svg" class="icon icon-expense">
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-card-info">
                <span class="text text-secondary">Deudas</span>
                <span id="home-total-debt" class="title title-main title-debt">$0.00</span>
            </div>
            <div class="icon-container">
                <div class="icon-bg icon-bg-debt"></div>
                <img src="assets/icons/credit-card.svg" class="icon icon-debt">
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-card-info">
                <span class="text text-secondary">Ahorro</span>
                <span id="home-net-balance" class="title title-main title-savings">$0.00</span>
            </div>
            <div class="icon-container">
                <div class="icon-bg icon-bg-savings"></div>
                <img src="assets/icons/saving.svg" class="icon icon-savings">
            </div>
        </div>
    </div>

    <!-- CARD 2 -->
    <div class="stats-row stats-row-col">
        <div class="register-card">
            <div class="register-card-header">
                <img src="assets/icons/plus.svg" class="icon icon-income">
                <span class="subtitle">Registrar Ingresos</span>
            </div>
            <input id="home-income-name" class="input" placeholder="Nombre">
            <input id="home-income-amount" class="input" placeholder="Monto" type="number">
            <button id="btn-save-home-income" class="btn btn-income">Registrar</button>
        </div>

        <div class="register-card">
            <div class="register-card-header">
                <img src="assets/icons/plus.svg" class="icon icon-expense">
                <span class="subtitle">Registrar Gastos</span>
            </div>
            <input id="home-expense-name" class="input" placeholder="Nombre">
            <input id="home-expense-amount" class="input" placeholder="Monto" type="number">
            <button id="btn-save-home-expense" class="btn btn-expense">Registrar</button>
        </div>
    </div>

    <!-- CARD 3 -->
    <div class="analysis-row">
        <div class="distribution-card">
            <span class="subtitle">Distribución del Presupuesto</span>

            <div class="distribution-item">
                <div class="distribution-header">
                    <span class="text text-main2">Gastos</span>
                    <span id="home-expenses-percent" class="text text-main2">0%</span>
                </div>
                <div class="progress-bar">
                    <div id="home-expenses-bar" class="progress-fill progress-expense" style="width: 0%"></div>
                </div>
            </div>

            <div class="distribution-item">
                <div class="distribution-header">
                    <span class="text text-main2">Ahorro Potencial</span>
                    <span id="home-savings-percent" class="text text-main2">0%</span>
                </div>
                <div class="progress-bar">
                    <div id="home-savings-bar" class="progress-fill progress-income" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div class="financial-state-card">
            <span class="subtitle">Estado Financiero</span>

            <div class="financial-state-item">
                <span class="text text-light text-main2">Total de Ingresos:</span>
                <span id="home-state-income" class="text text-main2 text-income">$0</span>
            </div>

            <div class="financial-state-item">
                <span class="text text-light text-main2">Total de Gastos:</span>
                <span id="home-state-expenses" class="text text-main2 text-expense">$0</span>
            </div>

            <div class="financial-state-item">
                <span class="text text-light text-main2">Pagos de Deuda:</span>
                <span id="home-state-debt" class="text text-main2 text-debt">$0</span>
            </div>

            <div class="financial-state-item financial-state-total">
                <span class="text text-main text-balance" style="font-weight: 600;">Balance Neto:</span>
                <span id="home-state-balance" class="text text-main text-balance" style="font-weight: 600;">$0,0</span>
            </div>
        </div>
    </div>


    <div class="chart-card">
        <span class="subtitle">Visualización de Presupuesto</span>

        <div class="chart-bars">
            <div class="chart-bar-item bg-income" data-label="Ingresos">
                <div class="icon-container">
                    <div class="icon-bg icon-bg-income"></div>
                    <img src="assets/icons/increase.svg" class="icon icon-income">
                </div>
            </div>
            <div class="chart-bar-item bg-expense" data-label="Gastos">
                <div class="icon-container">
                    <div class="icon-bg icon-bg-expense"></div>
                    <img src="assets/icons/degrowth.svg" class="icon icon-expense">
                </div>
            </div>
            <div class="chart-bar-item bg-debt" data-label="Deudas">
                <div class="icon-container">
                    <div class="icon-bg icon-bg-debt"></div>
                    <img src="assets/icons/credit-card.svg" class="icon icon-debt">
                </div>
            </div>
            <div class="chart-bar-item bg-savings" data-label="Ahorro">
                <div class="icon-container">
                    <div class="icon-bg icon-bg-savings"></div>
                    <img src="assets/icons/saving.svg" class="icon icon-savings">
                </div>
            </div>
        </div>
    </div>
</div>
