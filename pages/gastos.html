<div class="history-card">
    <h2 class="title title-main">Historial de Gastos</h2>

    <div class="form form-expense">
        <div class="fields">
            <div class="field">
                <span class="text text-secondary">Nombre</span>
                <input id="expense-name" class="input" placeholder="Nombre">
            </div>
            <div class="field">
                <span class="text text-secondary">Monto</span>
                <input id="expense-amount" class="input" placeholder="Monto" type="number">
            </div>
            <div class="field">
                <span class="text text-secondary">Categoria</span>
                <select id="categoria-select">
                    <option value="" disabled selected>Selecciona una categoría</option>
                    <option value="alimentacion">Alimentación</option>
                    <option value="transporte">Transporte</option>
                    <option value="vivienda">Vivienda</option>
                    <option value="salud">Salud</option>
                    <option value="educacion">Educación</option>
                    <option value="entretenimiento">Entretenimiento</option>
                    <option value="ropa">Ropa y calzado</option>
                    <option value="servicios">Servicios públicos</option>
                    <option value="tecnologia">Tecnología</option>
                    <option value="mascotas">Mascotas</option>
                    <option value="viajes">Viajes</option>
                    <option value="otro">Otro</option>
                </select>
            </div>
            <div class="field">
                <span class="text text-secondary">Fecha</span>
                <input id="expense-date" class="input input-date" placeholder="Selecciona una fecha" readonly>
            </div>
        </div>
        <div class="actions">
            <button id="btn-save-expense" class="btn btn-expense">Guardar</button>
            <button class="btn btn-base btn-cancel-expense">Cancelar</button>
        </div>
    </div>

    <div id="expense-list"></div>
</div>
