<div class="history-card">
    <div class="history-card-header">
        <span class="title title-main">Deudas</span>
        <button class="btn btn-debt btn-add-debt" style="width: auto; padding: 10px 16px;">
            <img src="assets/icons/plus.svg" class="icon icon-sm" style="filter: brightness(0) invert(1);">
            Agregar Deudas
        </button>
    </div>

    <!-- FORMULARIO CREAR -->
    <div class="form form-debt" id="form-create-debt" style="display:none">
        <div class="fields">
            <div class="field">
                <span class="text text-secondary">Nombre</span>
                <input id="debt-name" class="input" placeholder="Nombre">
            </div>
            <div class="field">
                <span class="text text-secondary">Total Monto</span>
                <input id="debt-total" class="input" placeholder="Total Monto" type="number">
            </div>
            <div class="field">
                <span class="text text-secondary">Monto Restante</span>
                <input id="debt-remaining" class="input" placeholder="Igual al total si no ha pagado nada"
                    type="number">
            </div>
            <div class="field">
                <span class="text text-secondary">Número de cuotas</span>
                <input id="debt-installments" class="input" placeholder="Ej: 12" type="number" min="1">
            </div>
            <div class="field">
                <span class="text text-secondary">Cuotas ya pagadas</span>
                <input id="debt-installments-paid" class="input" placeholder="Ej: 3 (0 si empieza ahora)" type="number"
                    min="0" value="0">
            </div>
            <div class="field">
                <span class="text text-secondary">Categoria</span>
                <select id="debt-category-select">
                    <option value="" disabled selected>Selecciona una categoría</option>
                    <option value="tarjeta">Tarjeta de crédito</option>
                    <option value="prestamo">Préstamo personal</option>
                    <option value="hipoteca">Hipoteca</option>
                    <option value="vehiculo">Crédito vehículo</option>
                    <option value="estudiantil">Préstamo estudiantil</option>
                    <option value="familiar">Deuda familiar</option>
                    <option value="negocio">Deuda de negocio</option>
                    <option value="otro">Otro</option>
                </select>
            </div>
            <div class="field">
                <span class="text text-secondary">Fecha de Vencimiento <span class="text-light">(opcional)</span></span>
                <input id="debt-date" class="input input-date" placeholder="Selecciona una fecha" readonly>
            </div>
            <div class="field">
                <span class="text text-secondary">Tasa de interés anual (%)</span>
                <input id="debt-interest" class="input" placeholder="Ej: 12 (0 si no tiene interés)" type="number"
                    min="0">
            </div>
        </div>
        <div class="actions">
            <button id="btn-save-debt" class="btn btn-debt">Guardar</button>
            <button class="btn btn-base btn-cancel-debt">Cancelar</button>
        </div>
    </div>

    <!-- LISTA DE DEUDAS -->
    <div id="debt-list"></div>
</div>
